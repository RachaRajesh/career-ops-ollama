<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{NAME}} — Resume</title>
<style>
  /* =========================================================================
     Clean professional resume template — Canva-style
     - Centered header: name LARGE, role underneath, contact row below
     - NO black box, NO solid-color blocks anywhere
     - Thin gray dividers under section headers (subtle, classic)
     - Generous white space — looks like something a designer built
     - System fonts only: Georgia for display, Helvetica for body
     - ATS-friendly: real text, semantic HTML, no images-as-text
     ========================================================================= */
  @page {
    size: Letter;
    margin: 0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #2b2b2b;
    font-size: 10pt;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background: #ffffff;
  }

  /* ─── Centered header ─────────────────────────────────────────────────── */
  .header {
    text-align: center;
    padding: 0.15in 0.6in 0.25in 0.6in;
    background: #ffffff;
  }
  .header h1 {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28pt;
    font-weight: 400;
    letter-spacing: 2px;
    color: #1a1a1a;
    line-height: 1.1;
    text-transform: uppercase;
  }
  .header .role {
    font-size: 11pt;
    color: #666;
    margin: 8px 0 14px 0;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header .contact {
    font-size: 9.5pt;
    color: #4a4a4a;
    line-height: 1.6;
  }
  .header .contact .sep {
    color: #bbb;
    margin: 0 8px;
  }
  .header .contact a {
    color: inherit;
    text-decoration: none;
  }

  /* Divider under the contact line, matches the section-divider style */
  .header-divider {
    border-top: 0.5pt solid #d0d0d0;
    margin: 0 0.6in;
  }

  /* ─── Body ────────────────────────────────────────────────────────────── */
  .body {
    padding: 0.3in 0.6in 0.4in 0.6in;
    background: #ffffff;
  }

  /* Section header: SMALL CAPS, subtle gray rule underneath */
  h2 {
    font-size: 10.5pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #1a1a1a;
    margin: 0.24in 0 0.1in 0;
    padding-bottom: 6px;
    border-bottom: 0.5pt solid #cfcfcf;
  }
  section:first-of-type h2 { margin-top: 0; }
  section { margin-bottom: 0.1in; }

  /* Summary paragraph */
  .summary {
    font-size: 10pt;
    line-height: 1.6;
    color: #333;
    margin: 0;
    text-align: justify;
  }

  /* Job blocks */
  .job, .project, .edu-block {
    margin-bottom: 0.2in;
    page-break-inside: avoid;
  }
  .job-title {
    font-size: 11pt;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0;
  }
  .job-meta-line {
    font-size: 9.5pt;
    color: #666;
    margin: 2px 0 6px 0;
    font-weight: 400;
    font-style: italic;
  }
  .job-meta-line .dates {
    color: #888;
    font-style: normal;
  }

  /* Bullets: looser line-height for 2-3 line expanded bullets */
  .bullets {
    margin: 0;
    padding-left: 18px;
    font-size: 9.8pt;
    line-height: 1.55;
    color: #333;
  }
  .bullets li {
    margin-bottom: 5px;
  }
  .bullets li::marker {
    color: #888;
  }

  /* Projects */
  .project-name {
    font-size: 10.5pt;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0;
  }
  .project-link {
    font-size: 8.8pt;
    color: #777;
    margin: 2px 0 3px 0;
    font-style: italic;
    word-break: break-all;
  }
  .project-desc {
    font-size: 9.5pt;
    color: #333;
    margin: 0;
    line-height: 1.5;
  }

  /* Education */
  .edu-block .degree {
    font-size: 10.5pt;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0;
  }
  .edu-block .school {
    font-size: 9.5pt;
    color: #666;
    margin: 2px 0 0 0;
    font-style: italic;
  }

  /* Certifications: inline, compact */
  .cert-block {
    margin-bottom: 8px;
  }
  .cert-block .name {
    font-size: 10pt;
    font-weight: 600;
    color: #1a1a1a;
  }
  .cert-block .issuer {
    font-size: 9.5pt;
    color: #666;
    font-weight: 400;
    font-style: italic;
  }

  /* Skills: single paragraph with bold labels, clean spacing */
  .skills-paragraph {
    font-size: 9.8pt;
    line-height: 1.7;
    color: #333;
    margin: 0;
  }
  .skills-paragraph strong {
    color: #1a1a1a;
    font-weight: 600;
  }

  /* Pagination */
  h2 { page-break-after: avoid; }
</style>
</head>
<body>

<div class="header">
  <h1>{{NAME}}</h1>
  <div class="role">{{ROLE_TARGET}}</div>
  <div class="contact">{{CONTACT_INLINE}}</div>
</div>
<div class="header-divider"></div>

<div class="body">

  <section>
    <h2>Professional Summary</h2>
    <p class="summary">{{SUMMARY}}</p>
  </section>

  <section>
    <h2>Experience</h2>
    {{EXPERIENCE_BLOCK}}
  </section>

  {{PROJECTS_SECTION}}

  <section>
    <h2>Skills</h2>
    <p class="skills-paragraph">{{SKILLS_PARAGRAPH}}</p>
  </section>

  <section>
    <h2>Education</h2>
    {{EDUCATION_BLOCK}}
  </section>

  {{CERTS_SECTION}}

</div>

</body>
</html>
