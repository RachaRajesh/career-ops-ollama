<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{NAME}} — Resume</title>
<style>
  /* =========================================================================
     Single-column resume template — matches the user's ORG_resume.pdf style
     - Black header band with name + role + contact in white
     - White body with caps section headers and horizontal-rule underline
     - Job titles bold, company/dates on subline
     - Skills as a single grouped paragraph at the bottom
     - System fonts only — Helvetica/Arial fallback
     - ATS-friendly: real text, no images-as-text, no layout tables
     ========================================================================= */
  @page {
    size: Letter;
    margin: 0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    font-size: 10pt;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    background: #ffffff;
  }

  /* ─── Header band (black) ─────────────────────────────────────────────── */
  .header {
    background: #1a1a1a;
    color: #ffffff;
    padding: 0.6in 0.55in 0.45in 0.55in;
  }
  .header h1 {
    margin: 0;
    font-size: 22pt;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.1;
  }
  .header .role {
    font-size: 11pt;
    color: #d8d8d8;
    margin: 4px 0 0.2in 0;
    font-weight: 400;
  }
  .header .contact {
    font-size: 9pt;
    color: #d8d8d8;
    line-height: 1.6;
  }
  .header .contact span { margin-right: 14px; white-space: nowrap; }
  .header .contact a { color: inherit; text-decoration: none; }

  /* ─── Body ────────────────────────────────────────────────────────────── */
  .body {
    padding: 0.45in 0.55in 0.4in 0.55in;
    background: #ffffff;
  }

  h2 {
    font-size: 11pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #1a1a1a;
    margin: 0.28in 0 0.1in 0;
    padding-bottom: 5px;
    border-bottom: 1px solid #1a1a1a;
  }
  /* First section gets less top margin since it's right after the header */
  section:first-of-type h2 { margin-top: 0; }

  section { margin-bottom: 0.18in; }

  /* Summary paragraph */
  .summary {
    font-size: 10pt;
    line-height: 1.55;
    color: #2a2a2a;
    margin: 0;
    text-align: justify;
  }

  /* Job blocks */
  .job, .project, .edu-block {
    margin-bottom: 0.2in;
    page-break-inside: avoid;
  }
  .job-title {
    font-size: 10.5pt;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0;
  }
  .job-meta-line {
    font-size: 9.5pt;
    color: #555;
    margin: 1px 0 4px 0;
    font-weight: 400;
  }
  .job-meta-line .dates { color: #777; }

  .bullets {
    margin: 0;
    padding-left: 18px;
    font-size: 9.8pt;
    line-height: 1.55;
    color: #2a2a2a;
  }
  .bullets li {
    margin-bottom: 5px;
  }

  /* Project blocks — same style as jobs but tighter */
  .project-name {
    font-size: 10pt;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0;
  }
  .project-link {
    font-size: 8.8pt;
    color: #666;
    margin: 1px 0 3px 0;
    word-break: break-all;
  }
  .project-desc {
    font-size: 9.5pt;
    color: #2a2a2a;
    margin: 0;
    line-height: 1.45;
  }

  /* Education blocks */
  .edu-block .degree {
    font-size: 10pt;
    font-weight: 700;
    color: #1a1a1a;
    margin: 0;
  }
  .edu-block .school {
    font-size: 9.5pt;
    color: #555;
    margin: 1px 0 0 0;
  }

  /* Certifications — compact list */
  .cert-block {
    margin-bottom: 6px;
  }
  .cert-block .name {
    font-size: 10pt;
    font-weight: 600;
    color: #1a1a1a;
  }
  .cert-block .issuer {
    font-size: 9.5pt;
    color: #555;
    font-weight: 400;
  }

  /* Skills — single grouped paragraph layout (matches ORG_resume.pdf) */
  .skills-paragraph {
    font-size: 9.8pt;
    line-height: 1.6;
    color: #2a2a2a;
    margin: 0;
  }

  /* Pagination cleanup */
  h2 { page-break-after: avoid; }
</style>
</head>
<body>

<div class="header">
  <h1>{{NAME}}</h1>
  <div class="role">{{ROLE_TARGET}}</div>
  <div class="contact">{{CONTACT_INLINE}}</div>
</div>

<div class="body">

  <section>
    <h2>Professional Summary</h2>
    <p class="summary">{{SUMMARY}}</p>
  </section>

  <section>
    <h2>Experience</h2>
    {{EXPERIENCE_BLOCK}}
  </section>

  {{PROJECTS_SECTION}}

  <section>
    <h2>Skills</h2>
    <p class="skills-paragraph">{{SKILLS_PARAGRAPH}}</p>
  </section>

  <section>
    <h2>Education</h2>
    {{EDUCATION_BLOCK}}
  </section>

  {{CERTS_SECTION}}

</div>

</body>
</html>
