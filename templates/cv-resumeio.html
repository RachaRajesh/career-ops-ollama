<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{NAME}} — Resume</title>
<style>
  /* =========================================================================
     Resume.io / ORG_resume layout — visually identical to the user's reference.
     Key visual choices:
       - Left-aligned name (large, bold) with a tagline subtitle
       - Contact info as a single line below name
       - Section headers in SMALL CAPS, teal color, with thin underline rule
       - Dates in left margin (small caps gray) with role + company on right
       - Bullets render as paragraph blocks — no bullet markers, no list dots
       - Accent color: a desaturated teal/navy (matches ORG's section header tint)
     ATS-friendly: real text, semantic HTML, no images-as-text.
     ========================================================================= */
  @page {
    size: Letter;
    margin: 0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Lato", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #2b2b2b;
    font-size: 9.5pt;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    background: #ffffff;
  }

  /* ─── Header — name on left, no centering ────────────────────────────── */
  .header {
    padding: 0.4in 0.55in 0.18in 0.55in;
    background: #ffffff;
  }
  .header h1 {
    margin: 0;
    font-size: 22pt;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.05;
    letter-spacing: -0.3px;
  }
  .header .subtitle {
    font-size: 11pt;
    color: #6b7c8c;
    margin: 4px 0 14px 0;
    font-weight: 400;
  }
  .header .contact {
    font-size: 9pt;
    color: #4a4a4a;
    line-height: 1.55;
  }
  .header .contact .sep {
    color: #c0c0c0;
    margin: 0 7px;
  }
  .header .contact a {
    color: inherit;
    text-decoration: none;
  }

  /* ─── Body ────────────────────────────────────────────────────────────── */
  .body {
    padding: 0.05in 0.55in 0.35in 0.55in;
    background: #ffffff;
  }

  /* Section header — small caps, teal accent, underline rule
     This is the most distinctive visual element from ORG_resume.pdf */
  h2 {
    font-size: 10pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: #2C5F7C;            /* teal accent — matches ORG */
    margin: 0.22in 0 0.1in 0;
    padding-bottom: 4px;
    border-bottom: 0.6pt solid #d8dde2;
  }
  section:first-of-type h2 { margin-top: 0; }
  section { margin-bottom: 0.05in; }

  /* Summary paragraph — sits under EMPLOYMENT HISTORY, before first job */
  .summary {
    font-size: 9.5pt;
    line-height: 1.5;
    color: #333;
    margin: 0 0 0.18in 0;
  }

  /* ─── Job blocks — two-column feel: dates left, content right ─────────── */
  .job {
    margin-bottom: 0.22in;
    page-break-inside: avoid;
  }
  .job-header {
    margin-bottom: 6px;
  }
  .job-dates {
    font-size: 8.5pt;
    color: #8a98a8;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
    margin: 0 0 2px 0;
  }
  .job-title {
    font-size: 10.5pt;
    font-weight: 700;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin: 0;
  }
  .job-company {
    font-size: 9.5pt;
    color: #4a4a4a;
    font-style: italic;
    margin: 1px 0 0 0;
  }

  /* Bullets render as paragraph blocks — no list markers, no indent.
     This matches ORG which uses paragraphs not lists. */
  .bullets {
    margin: 8px 0 0 0;
    padding: 0;
    list-style: none;
  }
  .bullets li {
    margin: 0 0 7px 0;
    font-size: 9.5pt;
    line-height: 1.5;
    color: #2e2e2e;
    /* Hanging-indent feel without bullet markers */
    padding-left: 0;
  }
  .bullets li::marker { content: ''; }

  /* ─── Education ───────────────────────────────────────────────────────── */
  .edu-block {
    margin-bottom: 0.12in;
  }
  .edu-block .degree {
    font-size: 10pt;
    font-weight: 700;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin: 0;
  }
  .edu-block .school {
    font-size: 9pt;
    color: #555;
    font-style: italic;
    margin: 1px 0 0 0;
  }

  /* ─── Skills — single dense paragraph, comma-separated within categories ── */
  .skills-paragraph {
    font-size: 9.5pt;
    line-height: 1.6;
    color: #333;
    margin: 0;
  }
  .skills-paragraph strong {
    color: #1a1a1a;
    font-weight: 600;
  }
  .skill-group {
    margin-bottom: 5px;
  }

  /* ─── Certifications — compact two-line per cert ──────────────────────── */
  .cert-block {
    margin-bottom: 8px;
  }
  .cert-block .name {
    font-size: 10pt;
    font-weight: 700;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .cert-block .issuer {
    font-size: 9pt;
    color: #555;
    font-style: italic;
    display: block;
    margin-top: 1px;
  }

  /* Pagination */
  h2 { page-break-after: avoid; }
  .job, .edu-block, .cert-block { page-break-inside: avoid; }
</style>
</head>
<body>

<div class="header">
  <h1>{{NAME}}</h1>
  <div class="subtitle">{{ROLE_TARGET}}</div>
  <div class="contact">{{CONTACT_INLINE}}</div>
</div>

<div class="body">

  <section>
    <h2>Professional Summary</h2>
    <p class="summary">{{SUMMARY}}</p>
  </section>

  <section>
    <h2>Employment History</h2>
    {{EXPERIENCE_BLOCK}}
  </section>

  <section>
    <h2>Skills</h2>
    <p class="skills-paragraph">{{SKILLS_PARAGRAPH}}</p>
  </section>

  <section>
    <h2>Education</h2>
    {{EDUCATION_BLOCK}}
  </section>

  {{CERTS_SECTION}}

</div>

</body>
</html>
