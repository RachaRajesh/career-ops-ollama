# templates/portals.example.yml — copy to portals.yml and edit.
#
# This file is consumed by `scripts/scan.mjs` (menu option 4) which crawls
# each portal's careers page looking for new job listings.
#
# ════════════════════════════════════════════════════════════════════════
# IMPORTANT — what scan.mjs can and CANNOT crawl
# ════════════════════════════════════════════════════════════════════════
#
# WORKS WELL on company-specific careers pages with a finite list of jobs:
#   - Greenhouse boards (boards.greenhouse.io/<company>)
#   - Lever boards (jobs.lever.co/<company>)
#   - Ashby boards (jobs.ashbyhq.com/<company>)
#   - Direct company /careers pages with a clear job list
#
# DOES NOT WORK on general aggregators (Indeed, LinkedIn, Glassdoor,
# ZipRecruiter, Monster, Dice, etc.) because:
#   - Millions of listings — no way to crawl meaningfully
#   - Heavy anti-scraping (Cloudflare, captchas, IP rate limits)
#   - Login walls
#   - Listings rotate constantly
#
# For aggregators, the right pattern is:
#   1. Set up email alerts on each one with your search criteria
#   2. They email you a daily digest of fresh matches
#   3. Copy the URLs you actually care about into your weekly Excel
#   4. Run the Excel through option `e` (Process Excel/CSV)
#
# That gives you the breadth of aggregators without trying to scrape them.
# The aggregator entries below are kept as REFERENCE LINKS for the
# alerts-based workflow, NOT for scanning.
# ════════════════════════════════════════════════════════════════════════

companies:
  # ─── AI labs & infra companies (work well with scan.mjs) ────────────
