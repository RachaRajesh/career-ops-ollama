  - name: Cohere
    url: https://cohere.com/careers
  - name: Mistral
    url: https://jobs.lever.co/mistral
  - name: Retool
    url: https://boards.greenhouse.io/retool
  - name: Vercel
    url: https://vercel.com/careers
  - name: Langfuse
    url: https://langfuse.com/careers
  - name: Pinecone
    url: https://www.pinecone.io/careers/
  - name: LangChain
    url: https://www.langchain.com/careers
  - name: Baseten
    url: https://jobs.ashbyhq.com/baseten
  - name: Distyl
    url: https://jobs.ashbyhq.com/Distyl
  - name: Mercor
