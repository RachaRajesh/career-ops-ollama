  - name: Uber
    url: https://www.uber.com/global/en/careers/list/
  - name: Chewy
    url: https://careers.chewy.com/us/en
  - name: PhysicsX
    url: https://job-boards.eu.greenhouse.io/physicsx
  - name: ProlificAcademic
    url: https://job-boards.eu.greenhouse.io/prolificacademicltd
  - name: BioRender
    url: https://jobs.gem.com/biorender
  - name: MathWorks
    url: https://www.mathworks.com/company/jobs/opportunities/
  - name: Bloomberg
    url: https://bloomberg.avature.net/careers/SearchJobs
  - name: RedHat
    url: https://redhat.wd5.myworkdayjobs.com/jobs    # Workday — scan may fail
  - name: Waystar
    url: https://careers.waystar.com/

  # ─── General aggregators (REFERENCE only — DO NOT scan, set alerts) ──
  # These won't be crawled by scan.mjs (see header comment). Keep them here
  # as the canonical search URLs for setting up email alerts.
  #
  # To skip these in scanning, uncomment the `disabled: true` lines below
  # OR just delete them from this file once you have your alerts set up.
  - name: Indeed
    url: https://www.indeed.com/jobs?q=AI+Engineer&l=Remote&fromage=3
    disabled: true   # set your alerts at: https://www.indeed.com/preferences
  - name: LinkedIn Jobs
    url: https://www.linkedin.com/jobs/search/?keywords=AI%20Engineer&f_TPR=r86400
    disabled: true   # set your alerts in the LinkedIn Jobs section
  - name: Glassdoor
    url: https://www.glassdoor.com/Job/jobs.htm?sc.keyword=AI+Engineer&fromAge=1
    disabled: true
  - name: ZipRecruiter
    url: https://www.ziprecruiter.com/Jobs/AI-Engineer
    disabled: true
  - name: Monster
    url: https://www.monster.com/jobs/search?q=ai-engineer
    disabled: true
  - name: SimplyHired
    url: https://www.simplyhired.com/search?q=ai+engineer&fdb=1
    disabled: true
  - name: Dice
    url: https://www.dice.com/jobs?q=AI%20Engineer&filters.postedDate=ONE
    disabled: true
  - name: CareerBuilder
    url: https://www.careerbuilder.com/jobs?keywords=ai+engineer
    disabled: true
  - name: TheMuse
    url: https://www.themuse.com/search/jobs?keyword=ai+engineer
    disabled: true
  - name: WayUp
    url: https://www.wayup.com/s/jobs/?q=ai+engineer
    disabled: true
  - name: USAJOBS
    url: https://www.usajobs.gov/Search/Results?k=ai+engineer
    disabled: true
  - name: FlexJobs
    url: https://www.flexjobs.com/search?search=ai+engineer
    disabled: true
  - name: Handshake
    url: https://app.joinhandshake.com/stu/postings
    disabled: true   # student/grad-focused — login required
  - name: Dice (again)
    url: https://www.dice.com/jobs?q=Machine%20Learning%20Engineer
    disabled: true

